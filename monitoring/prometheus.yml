# ALLRENTZ Enterprise Prometheus Configuration
# Comprehensive monitoring for industrial equipment platform

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'allrentz-production'
    environment: 'production'

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']
    scrape_interval: 30s

  # ALLRENTZ Application
  - job_name: 'allrentz-web'
    static_configs:
      - targets: ['allrentz-web:3000']
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s

  # Node Exporter (System metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s

  # cAdvisor (Container metrics)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 15s

  # Traefik Load Balancer
  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8080']
    scrape_interval: 30s

  # Redis Cache
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 30s

  # Grafana
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
    scrape_interval: 30s

  # AWS CloudWatch (if using AWS)
  - job_name: 'cloudwatch'
    ec2_sd_configs:
      - region: us-east-1
        port: 9100
    relabel_configs:
      - source_labels: [__meta_ec2_tag_Name]
        target_label: instance_name
      - source_labels: [__meta_ec2_instance_id]
        target_label: instance_id

  # ECS Service Discovery (if using ECS)
  - job_name: 'ecs-tasks'
    ecs_sd_configs:
      - region: us-east-1
        cluster: allrentz-production
        port: 3000
    relabel_configs:
      - source_labels: [__meta_ecs_task_definition_family]
        target_label: job
      - source_labels: [__meta_ecs_service_name]
        target_label: service
      - source_labels: [__meta_ecs_cluster_name]
        target_label: cluster

  # Blackbox Exporter for URL monitoring
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - https://app.allrentz.com
        - https://app.allrentz.com/health
        - https://app.allrentz.com/api/health
        - https://app.allrentz.com/browse
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # SSL Certificate monitoring
  - job_name: 'blackbox-ssl'
    metrics_path: /probe
    params:
      module: [ssl_verify]
    static_configs:
      - targets:
        - app.allrentz.com:443
        - monitoring.allrentz.com:443
        - prometheus.allrentz.com:443
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Database monitoring (if using separate DB)
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 30s

  # Custom ALLRENTZ business metrics
  - job_name: 'allrentz-business-metrics'
    static_configs:
      - targets: ['allrentz-web:3000']
    metrics_path: '/metrics/business'
    scrape_interval: 60s
    params:
      format: ['prometheus']

  # Security metrics
  - job_name: 'security-metrics'
    static_configs:
      - targets: ['security-scanner:8080']
    metrics_path: '/metrics'
    scrape_interval: 300s  # 5 minutes

  # Performance metrics
  - job_name: 'performance-metrics'
    static_configs:
      - targets: ['allrentz-web:3000']
    metrics_path: '/metrics/performance'
    scrape_interval: 30s

remote_write:
  - url: "https://prometheus-remote-write.monitoring.allrentz.com/api/v1/write"
    basic_auth:
      username: "${REMOTE_WRITE_USERNAME}"
      password: "${REMOTE_WRITE_PASSWORD}"
    queue_config:
      max_samples_per_send: 1000
      max_shards: 200
      capacity: 2500

storage:
  tsdb:
    retention.time: 30d
    retention.size: 10GB